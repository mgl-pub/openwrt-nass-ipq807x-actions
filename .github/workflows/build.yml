name: Build AX6 NSS OpenWrt

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Free disk space
      run: |
        sudo rm -rf /usr/share/dotnet
        sudo rm -rf /opt/ghc
        sudo rm -rf /usr/local/lib/android
        sudo rm -rf /opt/hostedtoolcache
        sudo docker image prune -a -f

    - name: Install dependencies
      run: |
        sudo apt update
        sudo apt install -y build-essential clang flex bison g++ gawk \
        gcc-multilib g++-multilib gettext git libncurses-dev libssl-dev \
        python3-distutils rsync unzip zlib1g-dev file wget

    - name: Clone source
      run: |
        git clone https://github.com/qosmio/openwrt-ipq openwrt
        cd openwrt
        git checkout 25.12-nss

    - name: Cache downloads
      uses: actions/cache@v4
      with:
        path: openwrt/dl
        key: openwrt-dl-25

    - name: Update feeds
      run: |
        cd openwrt
        ./scripts/feeds update -a
        ./scripts/feeds install -a

    - name: Load config
      run: |
        cp ax6.config openwrt/.config

    - name: Generate config
      run: |
        cd openwrt
        make defconfig

    - name: Download packages
      run: |
        cd openwrt
        make download -j8

    - name: Build firmware
      run: |
        cd openwrt
        make -j4

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: ax6-nss-firmware
        path: openwrt/bin/targets/qualcommax/ipq807x

    - name: Create Release
      uses: softprops/action-gh-release@v2
      with:
        tag_name: ax6-nss
        files: openwrt/bin/targets/qualcommax/ipq807x/*
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
